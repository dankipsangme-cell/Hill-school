    // FIXED Firebase Config with error handling
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getDatabase, ref, onValue, set, goOffline, goOnline } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js';

    // Your exact config from file
    const firebaseConfig = {
      apiKey: "AIzaSyA3H1E6lX1f9T0gF1sS3eM2oR6kP8vQ7wX",
      authDomain: "hill-schools.firebaseapp.com",
      databaseURL: "https://hill-schools-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "hill-schools",
      storageBucket: "hill-schools.firebasestorage.app",
      messagingSenderId: "1094758498814",
      appId: "1:1094758498814:web:5d9c9a3b1b7c3e9f5a2d4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // NEW: Clear stale Firebase storage on init
    function clearFirebaseStorage() {
      try {
        localStorage.removeItem('firebase:previous_websocket_failure');
        localStorage.removeItem('firebaseio.com:hill-schools-default-rtdb.europe-west1.firebasedatabase.app');
        console.log('🧹 Cleared Firebase storage');
      } catch(e) { console.warn('Storage clear failed:', e); }
    }

    // Your existing SEED data unchanged
    const SEED = {/* full SEED from your file */};

    // NEW: Robust listener with timeout
    function listenWithFallback(path, updateFn, timeout = 5000) {
      clearFirebaseStorage(); // Ensure clean start
      const start = Date.now();
      
      const unsubscribe = onValue(ref(db, path), (snap) => {
        const data = snap.val();
        console.log(`✅ Live ${path}:`, data);
        setSS('o', '🟢 Live');
        updateFn(data || {});
        unsubscribe(); // Unsub after first success
      }, (err) => {
        console.error(`❌ ${path} error:`, err);
        setSS('e', '🔴 Offline - Using backup');
        updateFn(SEED[path.replace('/', '')] || {});
      });

      // Fallback timeout
      setTimeout(() => {
        if (Date.now() - start > timeout) {
          console.log(`⏰ ${path} timeout - fallback`);
          setSS('e', '⏳ Backup');
          updateFn(SEED[path.replace('/', '')] || {});
          unsubscribe();
        }
      }, timeout);
    }

    // Your existing setSS function
    function setSS(key, val) { /* unchanged */ }

    // Replace your original onValue calls with:
    listenWithFallback('payments', (data) => updatePayments(data));
    listenWithFallback('students', (data) => updateStudents(data));
    listenWithFallback('feeStructure', (data) => updateFeeStructure(data));

    // Your other functions unchanged: updatePayments, forceUpload, etc.
    // forceUpload() now also calls goOnline() for retry

    // Auto-retry online
    window.addEventListener('online', () => {
      goOnline();
      setSS('o', '🔄 Reconnecting...');
      location.reload(); // Hard refresh for clean WS
    });

    console.log('🚀 Hill School Portal v2 - Fixed Firebase ready!');
